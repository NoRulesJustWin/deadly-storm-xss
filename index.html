<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr.Simon Levie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Share Tech Mono',monospace;overflow:hidden;height:100vh;width:100vw}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:9999}
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s,transform .9s}
.page.hidden{opacity:0;pointer-events:none;transform:scale(1.03)}
canvas#matrix{position:fixed;inset:0;z-index:0}
.content1{position:relative;z-index:10;text-align:center;padding:1.5rem;max-width:860px;width:100%}
.tag-line{font-size:.7rem;color:rgba(255,255,255,.3);letter-spacing:.4em;margin-bottom:.9rem;animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}

.group-name{font-family:'Orbitron',monospace;font-size:clamp(2.2rem,7vw,5.5rem);font-weight:900;color:#fff;text-shadow:0 0 12px #fff,0 0 35px rgba(255,255,255,.15);letter-spacing:.12em;line-height:1;white-space:nowrap;
animation:flicker 5s infinite, glitchName 7s infinite steps(1)}
@keyframes flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:.25}}
@keyframes glitchName {
    0% { transform: translate(0); text-shadow: 0 0 12px #fff; }
    20% { transform: translate(-3px, 1px); text-shadow: -2px 0 red, 2px 0 cyan; }
    21% { transform: translate(0); text-shadow: 0 0 12px #fff; }
    60% { transform: translate(3px, -1px); text-shadow: -2px 0 blue, 2px 0 yellow; }
    61% { transform: translate(0); text-shadow: 0 0 12px #fff; }
}

.divider{margin:.9rem auto;height:1px;width:55%;background:linear-gradient(90deg,transparent,#fff,transparent);box-shadow:0 0 8px #fff}
.desc-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:1rem 1.6rem;margin:.8rem auto;max-width:620px;text-align:left;font-size:.82rem;line-height:1.85;direction:ltr}
.desc-box .prompt{color:#fff}
.desc-box .cmd{color:#bbb}
.desc-box .out{color:#666}
.typed{border-right:2px solid #fff;animation:cur .8s step-end infinite}
@keyframes cur{50%{border-color:transparent}}
.members-title{font-family:'Orbitron',monospace;font-size:.65rem;letter-spacing:.35em;color:rgba(255,255,255,.28);margin:1.2rem 0 .6rem}
.members-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:.45rem;max-width:660px;margin:0 auto}
.member-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:.3rem .8rem;font-size:.78rem;color:#aaa;transition:all .2s;cursor:default}
.member-card::before{content:'> ';color:#444}
.member-card:hover{background:rgba(255,255,255,.1);border-color:#fff;color:#fff;text-shadow:0 0 6px #fff}
.member-card.leader{border-color:rgba(255,255,255,.2);color:#fff}
.bar-wrap{margin:1.5rem auto 0;width:200px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:100%;background:#fff;box-shadow:0 0 6px #fff;animation:shrink 3s linear forwards;transform-origin:left}
@keyframes shrink{from{transform:scaleX(1)}to{transform:scaleX(0)}}
.bar-label{margin-top:.45rem;font-size:.58rem;letter-spacing:.35em;color:rgba(255,255,255,.22);text-align:center}

/* PAGE 2 */
#page2{background:#000}
.video-wrap{position:fixed;inset:0;z-index:1;overflow:hidden}

@keyframes breathingBG {
    0% { transform: translate(-50%,-50%) scale(1); filter: grayscale(100%) contrast(1.1); }
    50% { transform: translate(-50%,-50%) scale(1.05); filter: grayscale(80%) contrast(1.2) brightness(0.9); }
    100% { transform: translate(-50%,-50%) scale(1); filter: grayscale(100%) contrast(1.1); }
}
.video-wrap img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);min-width:100%;min-height:100%;width:auto;height:auto;opacity:.5;object-fit:cover;
animation: breathingBG 15s ease-in-out infinite;}

.video-wrap::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(0,0,0,.15) 0%,rgba(0,0,0,.88) 100%)}

@keyframes floatOverlay {
    0% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-12px); }
    100% { transform: translateX(-50%) translateY(0); }
}
.overlay2{position:absolute;top:5%;left:50%;transform:translateX(-50%);width:100%;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1rem;
animation: floatOverlay 6s ease-in-out infinite;}

@keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,.15); color: #fff; transform: skewX(0deg); }
    50% { text-shadow: 0 0 30px #fff, 0 0 60px rgba(255,80,80,.2); color: #fdfdfd; }
    98% { text-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,.15); }
    99% { text-shadow: -3px 0 red, 3px 0 cyan; transform: skewX(2deg); }
}
.passed-text{font-family:'Orbitron',monospace;font-size:clamp(1.3rem,4.5vw,3rem);font-weight:900;color:#fff;letter-spacing:.12em;opacity:0;
animation: fadeUp 1.2s ease forwards, pulseGlow 6s 1.2s infinite;}

/* تم تقليل margin-top لرفع الرابط للأعلى قليلا */
.links-wrap{display:flex;flex-direction:column;align-items:center;gap:.9rem;margin-top:5vh;animation:fadeUp 1.2s .6s ease forwards;opacity:0}

.discord-link{font-family:'Share Tech Mono',monospace;font-size:clamp(1.1rem,2.5vw,1.4rem);color:#666;letter-spacing:.25em;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:4px;transition:all .3s cubic-bezier(0.25, 0.8, 0.25, 1);position: relative;}
.discord-link::before {content: ''; position: absolute; bottom: -1px; left: 0; width: 0; height: 1px; background: #fff; transition: width 0.3s ease;}
.discord-link:hover::before { width: 100%; }
.discord-link:hover{color:#fff;border-color:transparent;text-shadow:0 0 12px #fff; transform: scale(1.05);}

.links-divider{width:1px;height:15px;background:rgba(255,255,255,.15)}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.corner{position:fixed;width:44px;height:44px;border-color:rgba(255,255,255,.25);border-style:solid;z-index:12}
.corner.tl{top:14px;left:14px;border-width:2px 0 0 2px}
.corner.tr{top:14px;right:14px;border-width:2px 2px 0 0}
.corner.bl{bottom:14px;left:14px;border-width:0 0 2px 2px}
.corner.br{bottom:14px;right:14px;border-width:0 2px 2px 0}
</style>
</head>
<body>

<audio autoplay loop>
  <source src="https://h.top4top.io/m_3804cd9v11.mp3" type="audio/mpeg" />
</audio>

<div id="page1" class="page">
  <canvas id="matrix"></canvas>
  <div class="content1">
    <div class="tag-line">[ INITIALIZING SYSTEM... ]</div>
    <div class="group-name">Dr.Simon Levie</div>
    <div class="divider"></div>
    <div class="desc-box">
      <div><span class="prompt">root@dw:~$</span> <span class="cmd"> cat group_info.txt</span></div><br>
      <div class="out">// Group  : <span style="color:#ddd">Dr.Simon Levie</span></div>
      <div class="out">// Type   : <span style="color:#ddd">Programming &amp; Development</span></div>
      <div class="out">// Status : <span style="color:#fff">● ACTIVE</span></div><br>
      <div><span class="prompt">System@Dr.Simon Levie~$</span> <span class="cmd typed">_</span></div>
    </div>
    <div class="members-title">// ACTIVE MEMBERS //</div>
    <div class="members-grid" id="membersGrid"></div>
    <div class="bar-wrap"><div class="bar-fill"></div></div>
    <div class="bar-label">ENTERING IN 3s...</div>
  </div>
</div>

<div id="page2" class="page hidden">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="video-wrap">
    <img id="bgImage" src="https://4up4.com/uploads/file_2026-06-09_145553.mp4" alt="Background">
  </div>
  <div class="overlay2">
    <div class="passed-text">Passed By Dr.Simon Leviev 1337</div>
    <div class="links-wrap">
      <a class="discord-link" href="https://discord.gg/066" target="_blank">discord.gg/066</a>
    </div>
  </div>
</div>

<script>
// Matrix
const canvas=document.getElementById('matrix'),ctx=canvas.getContext('2d');
let cols,drops;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;cols=Math.floor(canvas.width/14);drops=new Array(cols).fill(1)}
resize();window.addEventListener('resize',resize);
const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*<>/\\|_+-=[]{}';
let last=0,raf;
function draw(ts){
  raf=requestAnimationFrame(draw);
  if(ts-last<50)return;
  last=ts;
  ctx.fillStyle='rgba(0,0,0,0.07)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font='14px "Share Tech Mono"';
  for(let i=0;i<cols;i++){
    const ch=chars[Math.random()*chars.length|0];
    const r=Math.random();
    ctx.globalAlpha=r*.5+.05;
    ctx.fillStyle=r>.95?'#fff':r>.5?'#888':'#2a2a2a';
    ctx.fillText(ch,i*14,drops[i]*14);
    if(drops[i]*14>canvas.height&&Math.random()>.975)drops[i]=0;
    drops[i]++;
  }
  ctx.globalAlpha=1;
}
raf=requestAnimationFrame(draw);

// Members
const members=['! ABO MT3B','8bx'];
const grid=document.getElementById('membersGrid');
const lc=document.createElement('div');
lc.className='member-card leader';lc.textContent='group member';
grid.appendChild(lc);
members.forEach(m=>{const c=document.createElement('div');c.className='member-card';c.textContent=m;grid.appendChild(c)});

// Transition
setTimeout(()=>{
  cancelAnimationFrame(raf);
  document.getElementById('page1').classList.add('hidden');
  document.getElementById('page2').classList.remove('hidden');
},3000);
</script>
</body>
</html>
